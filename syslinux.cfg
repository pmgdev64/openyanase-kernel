UI vesamenu.c32
DEFAULT yanase
PROMPT 0
TIMEOUT 100

MENU TITLE openYanase Boot Manager
MENU RESOLUTION 800 600
MENU BACKGROUND splash.png

# --- THIẾT KẾ CĂN GIỮA AN TOÀN ---
MENU WIDTH 40          # Chiều rộng khung menu (40 cột)
MENU MARGIN 20         # Lề trái: (80 cột tổng - 40 cột rộng) / 2 = 20
MENU ROWS 8            # Giảm số dòng để khung ngắn lại, dễ cân đối
MENU VSHIFT 12         # Đẩy xuống vừa phải (tầm 1/3 màn hình)
MENU TABMSGROW 20
MENU HELPMSGROW 22

# --- Màu sắc (Giữ nguyên hoặc làm nổi bật hơn) ---
MENU COLOR border       30;44   #40ffffff #00000000 std   # Hiện viền mờ để dễ debug vị trí
MENU COLOR title        1;36;44 #ffffffff #00000000 std
MENU COLOR sel          7;37;40 #ffffffff #40ffffff all
MENU COLOR unsel        37;44   #ffffffff #00000000 std

# --- Entries ---
LABEL yanase
    MENU LABEL [>] Start openYanase Core
    COM32 mboot.c32
    APPEND /boot/mykernel.elf

LABEL sep1
    MENU SEPARATOR

LABEL recovery
    MENU LABEL [!] Recovery Mode
    COM32 mboot.c32
    APPEND /boot/mykernel.elf recovery

LABEL info
    MENU LABEL [i] Hardware Info (Coming Soon)
    MENU DISABLE

LABEL sep2
    MENU SEPARATOR

LABEL reboot
    MENU LABEL [x] Reboot System
    COM32 reboot.c32